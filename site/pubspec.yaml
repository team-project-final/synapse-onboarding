name: synapse_runbooks
description: Synapse GitOps Runbook Viewer
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_markdown: ^0.7.6
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/runbooks/
    - assets/docs/
    - assets/docs/infra/
    - assets/docs/guides/
    - assets/docs/management/
    - assets/docs/prd/
    - assets/docs/rules/
    - assets/docs/fix-requests/
    - assets/docs/etc/
